name: Daily Paper Fetch

on:
  schedule:
    # 每天 UTC 1:00 运行 (北京时间 9:00)
    - cron: '0 1 * * *'
  push:
    branches:
      - main
  manual:  # 手动触发

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch papers from arXiv
      env:
        TZ: Asia/Shanghai
      run: python fetch_arxiv.py

    - name: Summarize papers
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      run: python summarize.py

    - name: Push to repository
      run: |
        git config user.name "gitee-actions"
        git config user.email "actions@gitee.com"
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 添加 $(date '+%Y-%m-%d') 论文日报" && git push)