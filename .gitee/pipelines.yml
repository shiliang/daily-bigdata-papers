name: Daily Paper Fetch

on:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - main

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: python3 main.py

      - name: Push changes
        run: |
          git config user.name "gitee-actions"
          git config user.email "actions@gitee.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 添加 $(date '+%Y-%m-%d') 论文日报" && git push)